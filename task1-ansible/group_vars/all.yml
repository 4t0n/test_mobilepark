---
# Переменные, применяемые ко всем хостам.

admin_users:
  - name: admin-1
    ssh_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPlaceholderKeyAdmin1 admin-1@mobilepark"
  - name: admin-2
    ssh_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPlaceholderKeyAdmin2 admin-2@mobilepark"
  - name: admin-3
    ssh_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPlaceholderKeyAdmin3 admin-3@mobilepark"

technical_users:
  - name: ansible
    ssh_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPlaceholderKeyAnsible ansible@mobilepark"
    sudo_nopasswd: true
  - name: autodeploy
    ssh_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPlaceholderKeyAutodeploy autodeploy@mobilepark"

docker_version: "29.1.3-0ubuntu3~22.04.2"

docker_group_members:
  - admin-1
  - admin-2
  - admin-3
  - ansible
  - autodeploy

swarm_manager_ip: "{{ hostvars['swarm-manager']['ansible_host'] }}"

swarm_port: 2377

swarm_node_label_key: "SERVERTYPE"
swarm_node_label_value: "worker"

required_packages:
  - mc
  - ncdu
  - cifs-utils
  - nfs-common
